name: CI

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '0 7 * * *'   # daily — covers bot bump commits (GITHUB_TOKEN commits don't fire push events)
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Ruby syntax check
        run: ruby -c Formula/ferro.rb

      - name: Tap and audit formula by name
        run: |
          # `brew audit <path>` is disabled in current Homebrew — audit by qualified name
          # within the tap. --online verifies URL liveness + sha; --strict is omitted because
          # its rules target homebrew-core submission, not a private tap.
          brew tap albertogferrario/ferro
          brew audit --online albertogferrario/ferro/ferro
